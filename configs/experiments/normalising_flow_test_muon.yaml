# Experiment: NORMALISING_FLOW_TEST
# Normalising flow model (Zuko NSF with coupling transforms) predicting hospitalisations and deaths
experiment:
  name: "NORMALISING_FLOW_TEST_MUON"
  description: "Normalising Flow (RealNVP-style coupling) model predicting daily hospitalisations and deaths"

data_source: "configs/data/1K_june.yaml"

output:
  base_dir: "RESULTS/RESULTS_NORMALISING_FLOW_RETEST/{name}"

columns:
  prediction: ["daily_hospitalised", "deaths", "Rt2"]
  context: ["daily_hospitalised", "deaths"]
  continuous_targets: ["Rt2"]

execution:
  mode: "train"
  resume_training: false
  device: "cuda"
  use_compile: false
  use_bfloat16: true

training:
  num_epochs: 10000
  learning_rate: 1.0e-3
  num_batches: 20
  batch_size: 128
  use_early_stopping: false
  validation_thinning_factor: 25
  validation_batch_size: 64
  optimiser: "muon"
  gradient_accumulation_steps: 10
  muon:
    lr: 0.01
    momentum: 0.95
    weight_decay: 0.0
  adamw:
    lr: 2.5e-4
    weight_decay: 0.01

context:
  size: 30
  include_latest: true
  min_timestep: 0

embeddings:
  spatial: 8
  temporal: 8

model:
  type: "normalising_flow_nsf"

  normalising_flow_nsf:
    hidden_layers: [128, 128]
    num_transforms: 3
    sigma: 0.1
    dropout: 0.1

  spatial_encoder_type: "gnn"

  gnn:
    dropout: 0.1
    self_loops: true
    residual_connections: true
    attention_heads: [2, 2]
    attention_head_concat: [true, false]

graph:
  edge_threshold_spatial: null
  edge_threshold_temporal: null
  use_edge_attr: true
  edge_attr_dim: 1
  use_k_nearest_features: true
  use_k_nearest_distance: true
  knn_k: 9

ablations:
  spatial: false

testing:
  autoregressive_windows: [180]
  num_samples: 200
  window_batch_size: 8
