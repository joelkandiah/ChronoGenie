# Experiment: NORMALISING_FLOW_CNF_TEST
# Normalising flow model (Zuko CNF / NODEs) predicting hospitalisations and deaths
experiment:
  name: "NORMALISING_FLOW_CNF_TEST"
  description: "Normalising Flow (Continuous Normalizing Flow / NODEs) model predicting daily hospitalisations and deaths"

data_source: "configs/data/1K_june.yaml"

output:
  base_dir: "RESULTS/RESULTS_NORMALISING_FLOW_RETEST/{name}"

columns:
  prediction: ["daily_hospitalised", "deaths", "Rt2"]
  context: ["daily_hospitalised", "deaths"]
  continuous_targets: ["Rt2"]

execution:
  mode: "both"
  resume_training: false
  device: "cuda"

training:
  num_epochs: 1200
  learning_rate: 1.0e-3
  num_batches: 10
  batch_size: 64
  use_early_stopping: false

context:
  size: 30
  include_latest: true
  min_timestep: 0

embeddings:
  spatial: 8
  temporal: 8

model:
  type: "normalising_flow_cnf"

  normalising_flow_cnf:
    hidden_layers: [128, 128]
    sigma: 0.1
    dropout: 0.1

  spatial_encoder_type: "gnn"

  gnn:
    dropout: 0.1
    self_loops: true
    residual_connections: true
    attention_heads: [2, 2]
    attention_head_concat: [true, false]

graph:
  edge_threshold_spatial: null
  edge_threshold_temporal: null
  use_edge_attr: true
  edge_attr_dim: 1
  use_k_nearest_features: true
  use_k_nearest_distance: true
  knn_k: 9

ablations:
  spatial: false

testing:
  autoregressive_windows: [180]
  num_samples: 100
  window_batch_size: 4
