# Experiment: UNCONNECTED_FINAL_1K
# GNN with no inter-MSOA edges (only self-loops)
experiment:
  name: "UNCONNECTED_FINAL_1K"
  description: "Unconnected GNN baseline - no edges between MSOAs, only self-loops"

data_source: "configs/data/1K_june.yaml"

output:
  base_dir: "RESULTS_LATEST_07_12_25/{name}"

columns:
  prediction: ["daily_hospitalised", "deaths"]
  context: ["daily_hospitalised", "deaths"]
  continuous_targets: []

execution:
  mode: "both"
  resume_training: false
  device: "cuda"

training:
  num_iterations: 300
  learning_rate: 1.0e-3
  num_batches: 10
  batch_size: 64
  use_early_stopping: false

context:
  size: 30
  include_latest: true
  min_timestep: 0

embeddings:
  spatial: 8
  temporal: 8

model:
  temporal_mlp:
    hidden_layers: [256, 256, 128, 128]
  
  spatial_encoder_type: "gnn"
  
  gnn:
    dropout: 0.1
    self_loops: true  # Only self-loops remain
    residual_connections: true
    attention_heads: [2, 2]
    attention_head_concat: [true, false]
  
  mlp_encoder:
    hidden_layers: [128, 64, 32]
    dropout: 0.2

graph:
  # KEY DIFFERENCE: All edge creation disabled
  edge_threshold_spatial: 0
  edge_threshold_temporal: 0
  use_edge_attr: false
  edge_attr_dim: 1
  use_k_nearest_features: false
  use_k_nearest_distance: false
  knn_k: 0

ablations:
  spatial: false

testing:
  autoregressive_windows: [180]
  num_samples: 100
