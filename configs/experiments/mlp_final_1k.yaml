# Experiment: MLP_FINAL_1K
# MLP spatial encoder instead of GNN
experiment:
  name: "MLP_FINAL_1K"
  description: "MLP spatial encoder baseline - replaces GNN with MLP for spatial encoding"

data_source: "configs/data/1K_june.yaml"

output:
  base_dir: "RESULTS_LATEST_07_12_25/{name}"

columns:
  prediction: ["daily_hospitalised", "deaths"]
  context: ["daily_hospitalised", "deaths"]
  continuous_targets: []

execution:
  mode: "both"
  resume_training: false
  device: "cuda"

training:
  num_iterations: 300
  learning_rate: 1.0e-3
  num_batches: 10
  batch_size: 64
  use_early_stopping: false

context:
  size: 30
  include_latest: true
  min_timestep: 0

embeddings:
  spatial: 8
  temporal: 8

model:
  temporal_mlp:
    hidden_layers: [256, 256, 128, 128]
  
  spatial_encoder_type: "mlp"  # KEY DIFFERENCE: MLP instead of GNN
  
  gnn:
    dropout: 0.1
    self_loops: true
    residual_connections: true
    attention_heads: [2, 2]
    attention_head_concat: [true, false]
  
  mlp_encoder:
    hidden_layers: [128, 64, 32]
    dropout: 0.2

graph:
  edge_threshold_spatial: null
  edge_threshold_temporal: null
  use_edge_attr: true
  edge_attr_dim: 1
  use_k_nearest_features: true
  use_k_nearest_distance: true
  knn_k: 9

ablations:
  spatial: false

testing:
  autoregressive_windows: [180]
  num_samples: 100
