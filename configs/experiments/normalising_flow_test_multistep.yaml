# Experiment: NORMALISING_FLOW_TEST_MULTISTEP
# Normalising flow model (Zuko NSF with coupling transforms) predicting hospitalisations and deaths using multi-step/token predictions
experiment:
  name: "NORMALISING_FLOW_TEST_MULTISTEP"
  description: "Normalising Flow (RealNVP-style coupling) model predicting daily hospitalisations and deaths"

data_source: "configs/data/1K_june.yaml"

output:
  base_dir: "RESULTS/RESULTS_NORMALISING_FLOW_RETEST/{name}"

columns:
  prediction: ["daily_hospitalised", "deaths", "Rt2"]
  context: ["daily_hospitalised", "deaths"]
  continuous_targets: ["Rt2"]

execution:
  mode: "train"
  resume_training: false
  device: "cuda"
  multistep_k: 3
  multistep_weights: [1.0, 0.5, 0.25]
  use_compile: false

training:
  num_epochs: 40000
  learning_rate: 1.0e-4
  num_batches: 10
  batch_size: 64
  use_early_stopping: false
  validation_thinning_factor: 50
  validation_batch_size: 64
  max_grad_norm: 1.0
  gradient_clip_value

context:
  size: 30
  include_latest: true
  min_timestep: 0

embeddings:
  spatial: 8
  temporal: 8

model:
  type: "normalising_flow_nsf"

  normalising_flow_nsf:
    hidden_layers: [128, 128]
    num_transforms: 3
    sigma: 0.1
    dropout: 0.1
    tail_bound: 5.0

  spatial_encoder_type: "gnn"

  gnn:
    dropout: 0.1
    self_loops: true
    residual_connections: true
    attention_heads: [2, 2]
    attention_head_concat: [true, false]

graph:
  edge_threshold_spatial: null
  edge_threshold_temporal: null
  use_edge_attr: true
  edge_attr_dim: 1
  use_k_nearest_features: true
  use_k_nearest_distance: true
  knn_k: 9

ablations:
  spatial: false

testing:
  autoregressive_windows: [180]
  num_samples: 200
  window_batch_size: 8
  checkpoint_source: "final"
