# Experiment: VARIATIONAL_FLOW_MATCHING_TEST_MINI_COSINE
# Variational Flow Matching model predicting hospitalisations, deaths, and Rt2 using an cosine scheduler
experiment:
  name: "VARIATIONAL_FLOW_MATCHING_TEST_ALT_PARAMS_MINI_NEW_CONTEXT_COSINE_ALT_LR"
  description: "Variational Flow Matching model predicting daily hospitalisations and deaths with non-natural params and a smaller network"

data_source: "configs/data/1K_june.yaml"

output:
  base_dir: "RESULTS/RESULTS_VARIATIONAL_FLOW_MATCHING_ALT_PARAMS_MINI/{name}"

columns:
  prediction: ["daily_hospitalised", "deaths", "Rt2"]
  context: ["daily_hospitalised", "deaths"]
  continuous_targets: ["Rt2"]

execution:
  mode: "train"
  resume_training: false
  device: "cuda"
  use_compile: false

lr_finder:
  start_lr: 1.0e-7
  end_lr: 1.0
  num_iter: 100
  beta: 0.98
  diverge_th: 5.0
  skip_start: 10
  skip_end: 5
  output_subdir: "lr_finder"
  csv_filename: "lr_finder_curve.csv"
  plot_filename: "lr_finder_curve.png"

training:
  num_epochs: 30000
  learning_rate: 3.0e-3
  num_batches: 10
  batch_size: 64
  use_early_stopping: false
  validation_thinning_factor: 50
  scheduler_type: "cosine"
  cosine_eta_min: 1.0e-6
  max_grad_norm: 1.0

context:
  size: 30
  include_latest: true
  min_timestep: 0

embeddings:
  spatial: 8
  temporal: 8

model:
  type: "variational_flow_matching"

  variational_flow_matching:
    hidden_layers: [256, 128, 128]
    sigma: 1.0
    dropout: 0.1
    parameterization: "mean"
    vfm_debug: false
    vfm_skip_connection: false
    latent_dim: 4
    kl_weight: 1.0
    kl_warmup_steps: 1000
    encoder_hidden: [128, 128]

  spatial_encoder_type: "gnn"

  gnn:
    dropout: 0.1
    self_loops: true
    residual_connections: true
    attention_heads: [2, 2]
    attention_head_concat: [true, false]

graph:
  edge_threshold_spatial: null
  edge_threshold_temporal: null
  use_edge_attr: true
  edge_attr_dim: 1
  use_k_nearest_features: true
  use_k_nearest_distance: true
  knn_k: 9

ablations:
  spatial: false

testing:
  autoregressive_windows: [180]
  num_samples: 200
  num_steps: 50
  window_batch_size: 8
