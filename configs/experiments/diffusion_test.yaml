# Experiment: DIFFUSION_TEST
# Diffusion model predicting hospitalisations and deaths
experiment:
  name: "DIFFUSION_TEST"
  description: "Diffusion model predicting daily hospitalisations and deaths"

data_source: "configs/data/1K_june.yaml"

output:
  base_dir: "RESULTS/RESULTS_DIFFUSION/{name}"

columns:
  prediction: ["daily_hospitalised", "deaths", "Rt2"]
  context: ["daily_hospitalised", "deaths"]
  continuous_targets: ["Rt2"]

execution:
  mode: "test"
  resume_training: false
  device: "cuda"

training:
  num_epochs: 20000
  learning_rate: 1.0e-4
  num_batches: 10
  batch_size: 2
  use_early_stopping: false
  use_compile: true
  validation_thinning_factor: 50
  validation_batch_size: 2

context:
  size: 30
  include_latest: true
  min_timestep: 0

embeddings:
  spatial: 8
  temporal: 8

model:
  type: "diffusion"

  diffusion:
    hidden_layers: [256, 256, 128, 128]
    time_embed_dim: 128
    num_train_timesteps: 1000
    beta_start: 1.0e-4
    beta_end: 2.0e-2
    dropout: 0.1

  spatial_encoder_type: "gnn"

  gnn:
    dropout: 0.1
    self_loops: true
    residual_connections: true
    attention_heads: [2, 2]
    attention_head_concat: [true, false]

graph:
  edge_threshold_spatial: null
  edge_threshold_temporal: null
  use_edge_attr: true
  edge_attr_dim: 1
  use_k_nearest_features: true
  use_k_nearest_distance: true
  knn_k: 9

ablations:
  spatial: false

testing:
  autoregressive_windows: [180]
  num_samples: 200
  window_batch_size: 8
